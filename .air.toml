#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  pre_cmd = [
    "bunx tsc --noEmit",
    "bunx tailwindcss -i ./web/src/input.css -o ./web/public/styles.css",
    "bun build ./web/src/index.ts --outdir=./web/public",
    "templ generate",
    # can comment tinygo build if no frequent changes to wasm and want rapid iteration of web frontend
    "GOOS=js GOARCH=wasm tinygo build -o ./web/public/main.wasm ./web/wasm",
    "echo 'proxy running at :3500'"
  ]
  cmd = "go build -o ./tmp/main ."
  delay = 1000
  entrypoint = ["./tmp/main"]
  follow_symlink = false
  full_bin = ""
  ignore_dangerous_root_dir = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "templ", "html", "css", "js", "ts"]
  include_file = []
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  # necessary cuz, templ generate will generate .go file, which may trigger air again, looping on itself
  exclude_unchanged = true
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[proxy]
  # enable live reloading on browser
  enabled = true
  proxy_port = 3500
  app_port = 3000 # assumes server is running at port 3000
  app_start_timeout = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
